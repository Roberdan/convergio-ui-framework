plan:
  name: "Maranello Design System v4 — Docs, Search, A11y, Quality"
  project: convergio-frontend-1775057215

waves:
  - id: W1
    name: "Fix & Restructure"
    tasks:
      - id: T1-01
        do: |
          Fix barrel exports and oversized files.
          1. Add mn-mesh-network-canvas, mn-mesh-network-card, mn-mesh-network-toolbar to network/index.ts barrel.
          2. Split 3 files >250 lines: mn-gauge.tsx (258→<250), mn-date-range-picker.tsx (251→<250), mn-command-palette.tsx (251→<250) into component + .helpers.ts.
          3. Verify: all files ≤250 lines, all barrel exports resolve, pnpm typecheck passes.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: refactor
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 1
        test_criteria: "All barrel exports resolve, no file >250 lines in maranello/, typecheck passes"
        verify:
          - "find src/components/maranello -name '*.tsx' | xargs wc -l | awk '$1 > 250 {found++} END {exit found ? 1 : 0}'"
          - "pnpm typecheck"
        depends_on: []

      - id: T1-02
        do: |
          Fix hardcoded hex colors in 22 component files — replace with CSS custom properties (--mn-*).
          Files: mn-augmented-brain, mn-neural-nodes, mn-user-table, mn-bullet-chart, mn-cohort-grid, mn-cost-timeline,
          mn-funnel, mn-gauge, mn-half-gauge, mn-hbar, mn-speedometer, mn-login, mn-map, mn-mesh-network-card,
          mn-mesh-network-toolbar, mn-network-messages, mn-social-graph, mn-gantt, mn-bcg-matrix,
          mn-business-model-canvas, mn-risk-matrix, mn-a11y.
          For canvas components using readPalette(): move hardcoded hex into the palette with proper light/dark/navy/colorblind branches.
          For HTML/JSX components: use Tailwind theme classes or CSS var() with --mn-* tokens.
          Verify: grep -rn '#[0-9a-fA-F]\{6\}' finds zero matches outside readPalette functions and canvas gradient definitions.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: refactor
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        test_criteria: "No hardcoded hex outside palette functions, all 4 themes render without contrast issues, typecheck passes"
        verify:
          - "pnpm typecheck"
          - "pnpm build"
          - "grep -rn '#[0-9a-fA-F]\\{6\\}' src/components/maranello/ --include='*.tsx' | grep -v readPalette | grep -v '// palette' | wc -l | xargs test 0 -eq"
        depends_on: []
        do: |
          Fix Ferrari Controls (mn-ferrari-control.tsx) cross-theme visibility.
          The Manettino dial, CruiseLever, ToggleLever, and SteppedRotary sub-components have text/element contrast
          issues on navy and light themes. The readPalette in mn-ferrari-control.helpers.ts needs proper theme branches.
          Ensure all labels (SPORT, WET, ESC OFF, RACE, COMFORT, OFF/SET/RES/ACC, DRS, percentages) are readable
          on all 4 themes with WCAG AA contrast ratios.
          Also fix mn-gauge.tsx and mn-speedometer.tsx readPalette for light theme text visibility.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: refactor
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        test_criteria: "All canvas text readable on 4 themes, no white-on-white or dark-on-dark text"
        verify:
          - "pnpm typecheck"
          - "pnpm build"
        depends_on: [T1-02]

      - id: T1-04
        do: |
          Restructure showcase app:
          1. Remove /preview page entirely (delete src/app/(dashboard)/preview/).
          2. In /showcase landing page, update category cards to link to /showcase/[category].
          3. Update sidebar navigation in layout.tsx with sections: Overview (Home, Showcase, Themes) + Categories (all 12).
          4. Update Cmd-K command-menu.tsx: replace old nav items with showcase sections + categories.
          5. Update maranello.yaml navigation.
          6. Remove dead showcase section files that are no longer used (showcase-advanced, etc) — move
             their demo content into the category page system via category-content.tsx.
          7. Update all E2E tests: remove /preview references, update page lists.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: refactor
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        test_criteria: "No /preview route, all categories navigable from sidebar and Cmd-K, E2E passes"
        verify:
          - "pnpm build"
          - "pnpm typecheck"
          - "! test -d src/app/\\(dashboard\\)/preview"
        depends_on: [T1-01]

  - id: W2
    name: "Complete Showcase + A11y"
    tasks:
      - id: T2-01
        do: |
          Add live demos for ALL 52 missing components in their category showcase pages.
          Missing components by category (from audit):
          - agentic: MnChat
          - data-display: MnAvatar, MnDataTable, MnDetailPanel
          - data-viz: MnChart, MnFunnel, MnHbar, MnSpeedometer
          - feedback: MnModal, MnStateScaffold, MnToast
          - forms: MnAsyncSelect, MnDatePicker, MnFormField, MnProfile
          - layout: MnDashboard, MnHeaderShell
          - navigation: MnBreadcrumb, MnCommandPalette, MnSectionNav, MnTabs
          - network: MnMap, MnMeshNetworkCanvas, MnMeshNetworkCard, MnMeshNetworkToolbar, MnSystemStatus
          - ops: MnEntityWorkbench, MnFacetWorkbench, MnGantt, MnKanbanBoard
          - strategy: MnCustomerJourney, MnOkr
          - theme: MnA11y, MnA11yFab, MnThemeToggle, MnThemeRotary
          Each component must render with realistic sample data in its category page.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: feature
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        test_criteria: "All 100 components visible in showcase, zero crashes, build passes"
        verify:
          - "pnpm build"
          - "pnpm typecheck"
        depends_on: [T1-04]

      - id: T2-02
        do: |
          Create component catalog data file: src/lib/component-catalog.ts
          For each of the 100 Maranello components, define:
          - name: export name (e.g. "MnBadge")
          - slug: kebab-case (e.g. "mn-badge")
          - category: category slug
          - description: 1-2 sentence semantic description (EN)
          - keywords: array of search keywords in EN + IT (e.g. ["badge", "status", "tag", "etichetta", "stato"])
          - propsInterface: name of the props interface
          - whenToUse: 1-2 sentences on when to use this component
          - filePath: relative path to source
          This file is the single source of truth for search, docs, and registry.
          Max 250 lines — split into component-catalog-data.ts if needed.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: feature
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        test_criteria: "Catalog covers 100 components, typecheck passes, each entry has all fields"
        verify:
          - "pnpm typecheck"
          - "node -e \"const c = require('./src/lib/component-catalog'); console.log(c.CATALOG.length)\" 2>/dev/null || echo 'check manually'"
        depends_on: [T1-04]

      - id: T2-03
        do: |
          Implement fuzzy search in Cmd-K (command-menu.tsx) using the component catalog.
          1. Import CATALOG from component-catalog.ts.
          2. Add a "Components" CommandGroup that shows matching components.
          3. Implement fuzzy matching: search across name, description, keywords, category.
          4. Use simple includes-based matching (no external fuzzy lib needed).
          5. Bilingual: keywords include both EN and IT terms.
          6. On select: navigate to /showcase/[category]#[component-slug] (anchor scroll).
          7. Show component icon (from category), name, and truncated description in results.
          8. Limit to top 8 results for performance.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: feature
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        test_criteria: "Cmd-K searches components by name/description/keywords, navigate to correct category page"
        verify:
          - "pnpm typecheck"
          - "pnpm build"
        depends_on: [T2-02]

      - id: T2-04
        do: |
          Accessibility hardening:
          1. Add MnA11yFab to root layout (src/app/layout.tsx or app-shell.tsx) so it's globally visible.
          2. Fix aria-label on mn-dashboard.tsx interactive cells (role=button needs accessible name).
          3. Audit all interactive components for: focus ring visibility, aria-label/aria-labelledby,
             keyboard navigation (Enter/Space activation).
          4. Ensure all canvas components have aria-label with current value (role=meter, role=img, etc).
          5. Add skip-to-content link at top of app-shell if not present.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: refactor
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        test_criteria: "A11yFab visible globally, no interactive element without aria attributes, focus rings work"
        verify:
          - "pnpm typecheck"
          - "pnpm build"
        depends_on: [T1-04]

      - id: T2-05
        do: |
          Add inline documentation to each category showcase page.
          For each component in the category page, render:
          1. Component name as heading with anchor id (for Cmd-K deep linking).
          2. Semantic description (when to use it).
          3. Props table: name | type | default | description — extracted from the TypeScript interface.
          4. Live demo with sample data.
          5. Code snippet showing basic usage.
          Create a reusable ComponentDoc wrapper: src/app/(dashboard)/showcase/component-doc.tsx
          that takes catalog entry + children (demo) and renders the documentation frame.
          Split props extraction into showcase/props-extractor.ts if needed.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: feature
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        test_criteria: "Every component demo has heading, description, props table, code snippet"
        verify:
          - "pnpm typecheck"
          - "pnpm build"
        depends_on: [T2-01, T2-02]

  - id: WC
    name: "Session Checkpoint"
    tasks:
      - id: TC-01
        do: |
          Session checkpoint: commit all pending changes, push to remote, update plan.md.
          Verify build + typecheck + lint pass before committing.
          If shell budget is low, suggest starting a new session.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: chore
        output_type: pr
        model: gpt-5-mini
        executor_agent: copilot
        validator_agent: thor
        effort: 1
        test_criteria: "All changes committed and pushed, build passes"
        verify:
          - "git status --porcelain | wc -l | xargs test 0 -eq"
          - "pnpm build"
        depends_on: [T2-05]

  - id: W3
    name: "Guides & MDX Documentation"
    tasks:
      - id: T3-01
        do: |
          Generate .mdx documentation files for all 100 components.
          Directory: docs/components/{category}/{component-slug}.mdx
          Each file contains:
          - Frontmatter: title, category, description, keywords
          - ## When to use
          - ## Props (table format)
          - ## Example (code block)
          - ## Accessibility notes (if applicable)
          Use component-catalog.ts as data source.
          Create a generation script: scripts/generate-component-docs.ts that reads catalog + source files
          and outputs .mdx files. This makes docs regeneratable.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: feature
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 3
        test_criteria: "100 .mdx files generated, each with frontmatter+props+example"
        verify:
          - "find docs/components -name '*.mdx' | wc -l | xargs test 100 -le"
          - "pnpm typecheck"
        depends_on: [TC-01]

      - id: T3-02
        do: |
          Create guide: docs/guides/creating-a-component.md
          Cover: Mn prefix naming, file structure (.tsx + .helpers.ts), CVA + cn() pattern,
          "use client" rules, CSS vars --mn-* (never hardcode), max 250 lines, named exports only,
          barrel export chain (category/index.ts → maranello/index.ts), adding to showcase,
          adding to component-catalog.ts, adding to registry (public/r/), writing tests.
          Include a complete example of creating a new MnExampleWidget from scratch.
          Only Lucide icons — zero emoji (CONSTITUTION P2).
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: documentation
        output_type: document
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: doc-validator
        effort: 2
        test_criteria: "Guide exists, covers all listed topics, includes complete example"
        verify:
          - "test -f docs/guides/creating-a-component.md"
          - "wc -l docs/guides/creating-a-component.md | awk '{if($1 < 80) exit 1}'"

      - id: T3-03
        do: |
          Create two guides:
          1. docs/guides/adding-icons.md — How to add icons: only Lucide, import in icon-map.ts,
             add to iconMap registry, use IconSlot for dynamic resolution, zero emoji (CONSTITUTION P2).
          2. docs/guides/extending-the-system.md — How to: create a new category (subdir + barrel + sidebar + Cmd-K),
             add a new theme (globals.css + data-theme + theme-provider), customize --mn-* tokens,
             contribute components (PR workflow), maintain WCAG AA compliance.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: documentation
        output_type: document
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: doc-validator
        effort: 2
        test_criteria: "Both guide files exist, each >50 lines, cover all listed topics"
        verify:
          - "test -f docs/guides/adding-icons.md"
          - "test -f docs/guides/extending-the-system.md"
        depends_on: []

      - id: T3-04
        do: |
          Update registry (public/r/) to reflect all fixes:
          1. Regenerate public/r/index.json and individual component JSON files.
          2. Include new .helpers.ts files bundled with parent components.
          3. Update dependencies detected from imports.
          4. Validate all JSON files are parseable.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: chore
        output_type: pr
        model: gpt-5-mini
        executor_agent: copilot
        validator_agent: thor
        effort: 1
        test_criteria: "Registry JSON valid, all 100+ components present, helpers bundled"
        verify:
          - "node -e \"JSON.parse(require('fs').readFileSync('public/r/index.json'))\""
          - "ls public/r/*.json | wc -l | xargs test 100 -le"
        depends_on: [T1-01, T1-02]

  - id: WF
    name: "Closure"
    tasks:
      - id: TF-tests
        do: |
          Full test suite validation:
          1. pnpm build — must succeed with 0 errors
          2. pnpm typecheck — must succeed with 0 errors
          3. pnpm lint — must have 0 errors (warnings OK)
          4. pnpm vitest run — all tests pass
          5. pnpm test:e2e — all tests pass (chromium + webkit)
          6. Verify no file >250 lines in maranello/
          7. Verify all 100 components in showcase
          Fix any failures before marking as done.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: test
        output_type: pr
        model: gpt-5.3-codex
        executor_agent: copilot
        validator_agent: thor
        effort: 2
        test_criteria: "All 5 check suites pass, no file >250 lines"
        verify:
          - "pnpm build"
          - "pnpm typecheck"
          - "pnpm lint 2>&1 | grep '0 errors'"
          - "pnpm vitest run"
        depends_on: [T3-01, T3-04, T2-03, T2-04, T3-02, T3-03]

      - id: TF-doc
        do: |
          Final documentation:
          1. Update CHANGELOG.md with all wave entries.
          2. Create docs/adr/plan-10060-notes.md with running notes.
          3. Update README.md if needed (component count, new guides, etc).
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: documentation
        output_type: document
        model: gpt-5-mini
        executor_agent: copilot
        validator_agent: doc-validator
        effort: 1
        test_criteria: "CHANGELOG updated, ADR notes exist, README current"
        verify:
          - "test -f docs/adr/plan-10060-notes.md"
          - "grep -q 'Unreleased' CHANGELOG.md"
        depends_on: [TF-tests]

      - id: TF-pr
        do: |
          Commit all changes, push to remote.
          Create descriptive commit messages per logical unit.
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: chore
        output_type: pr
        model: gpt-5-mini
        executor_agent: copilot
        validator_agent: thor
        effort: 1
        test_criteria: "All changes committed and pushed, git status clean"
        verify:
          - "git status --porcelain | wc -l | xargs test 0 -eq"
        depends_on: [TF-doc]

      - id: TF-deploy-verify
        do: |
          Final verification:
          1. pnpm build succeeds
          2. Start dev server and verify all pages load (/, /showcase, /showcase/data-viz, /showcase/themes)
          3. Verify Cmd-K fuzzy search works
          4. Verify A11yFab is visible
          5. Verify registry at public/r/index.json is valid
          6. Check all 4 themes render correctly
          Worktree: /Users/Roberdan/GitHub/convergio-frontend
        type: test
        output_type: pr
        model: gpt-5-mini
        executor_agent: copilot
        validator_agent: thor
        effort: 1
        test_criteria: "All pages load, search works, A11y visible, registry valid, 4 themes OK"
        verify:
          - "pnpm build"
          - "node -e \"JSON.parse(require('fs').readFileSync('public/r/index.json'))\""
        depends_on: [TF-pr]
